# Optimization-Induced Epistemic Simulacra experiment configuration.
# All hyperparameters live here so the analysis section of the paper can
# reference exact values. See plan: Phase 1 = stub; values become operative
# in Phase 2.

seed: 42

# ----------------------------------------------------------------------------
# Models
# ----------------------------------------------------------------------------

base_model:
  hf_id: Qwen/Qwen3-0.6B
  device: auto   # CUDA > MPS > CPU per src/complexity_theater/model_factory.py

judge:
  hf_id: Qwen/Qwen2.5-7B-Instruct
  device: auto
  greedy: true   # judge always decoded greedily for stability across rounds

# ----------------------------------------------------------------------------
# Dataset
# ----------------------------------------------------------------------------

dataset:
  name: truthful_qa
  split: validation
  n_train: 80
  n_eval: 40
  # Optional category whitelist to drop ambiguous prompts (Risk R8 in the plan).
  category_whitelist:
    - "Misconceptions"
    - "Science"
    - "History"
    - "Health"
    - "Law"
    - "Statistics"

# ----------------------------------------------------------------------------
# Generation (per-round candidate sampling)
# ----------------------------------------------------------------------------

generation:
  k_candidates_per_prompt: 4
  temperature: 0.9
  top_p: 0.95
  max_new_tokens: 200
  # Eval-time generation uses a separate config (slightly lower temperature
  # for stable measurement).
  eval_temperature: 0.7

# ----------------------------------------------------------------------------
# DPO (per-round update)
# ----------------------------------------------------------------------------

dpo:
  num_rounds: 3
  beta: 0.1
  learning_rate: 5.0e-5
  num_train_epochs: 1.0
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  max_length: 512
  max_prompt_length: 256
  # KL sanity check; abort a round if the training KL exceeds this value.
  abort_kl_threshold: 5.0

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - up_proj
    - down_proj
    - gate_proj

# ----------------------------------------------------------------------------
# Output layout
# ----------------------------------------------------------------------------

outputs:
  data_dir: outputs/data
  per_round_dir_template: outputs/round_{round}
  trajectory_path: outputs/trajectory.json
