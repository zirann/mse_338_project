# Minimal sub-saturation diagnostic for the judge arm. Same data (80/80 split)
# and same optimization knobs as judge_dpo_strong EXCEPT 1 epoch instead of 3.
# The strong (3-epoch) run saturated (loss -> ~0.001, rewards_margins -> ~8),
# which breaks the Delta_judge - Delta_random identification (optimization-
# intrinsic drift is no longer common across arms). The train_curve of the
# strong run was healthy only through ~step 20 = exactly 1 epoch (80 pairs /
# batch 4 / accum 1 = 20 steps), so 1 epoch is the sub-saturation regime.
#
# The dpo block deep-merges over configs/experiment.yaml; only the keys below
# are overridden. beta stays 0.1 (KL constraint not conflated).
base_config: configs/experiment.yaml

dpo:
  learning_rate: 1.0e-4
  num_train_epochs: 1.0
  gradient_accumulation_steps: 1
  # Fail-loud saturation guard (defaults shown explicitly for transparency).
  saturation_rewards_margins_max: 3.0
  saturation_loss_min: 0.05

arm:
  name: judge_dpo_1epoch
  pair_construction: judge
  length_match_ratio: null
  mitigation: none
  mitigation_params: {}
  out_dir_template: outputs/judge_dpo_1epoch/seed{seed}
